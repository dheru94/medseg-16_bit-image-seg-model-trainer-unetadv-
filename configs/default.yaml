# configs/default.yaml
# All training hyperparameters. CLI arguments override these values.

# ── Model ────────────────────────────────────────────────────────────────────
model: unet            # unet | unetpp | deeplab
n_channels: 4          # 4 = RGBA input, 1 = grayscale, 3 = RGB
n_classes: 1           # 1 = binary segmentation, >1 = multi-class
bilinear: false        # UNet only: true = bilinear upsample, false = transposed conv
dropout: 0.2           # Dropout at bottleneck (0.0 to disable)

# ── Data ─────────────────────────────────────────────────────────────────────
img_dir: data/images
mask_dir: data/masks
scale: 0.5             # Resize images to this fraction (0.5 = half size)
val_percent: 0.1       # 10% of data used for validation
mask_channel: 3        # Which channel in RGBA mask encodes labels (3 = alpha)
img_size: [512, 512]

# ── Training ─────────────────────────────────────────────────────────────────
epochs: 50
batch_size: 2
lr: 0.00001            # Learning rate (1e-5 for UNet/UNet++, 1e-4 for DeepLab)
momentum: 0.9          # RMSprop momentum
weight_decay: 0.00000001
gradient_clipping: 1.0
amp: true              # Mixed precision training (faster, less VRAM)

# ── Loss ─────────────────────────────────────────────────────────────────────
pos_weight: 2.0        # BCEWithLogitsLoss pos_weight for class imbalance
                       # increase (5-20) if foreground is very small
focal_gamma: 2.0       # Focal loss gamma (increase to 3.0-4.0 for severe imbalance)

# ── Checkpointing ────────────────────────────────────────────────────────────
checkpoint_dir: checkpoints
save_every: 1          # Save checkpoint every N epochs
keep_best_only: false  # If true, only keep the best val dice checkpoint

# ── Logging ───────────────────────────────────────────────────────────────────
log_dir: logs
log_interval: 10       # Log batch loss every N steps
